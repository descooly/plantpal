services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plantpal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/plantpal
    depends_on:
      - db

  frontend:
    build: ./client
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  postgres_data:
