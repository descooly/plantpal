apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: plantpal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: your-dockerhub-username/plantpal-api:latest  # заменишь позже
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: postgresql://postgres:postgres@postgres:5432/plantpal
